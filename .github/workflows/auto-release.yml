name: Build and Release

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path "requirements.txt") {
          pip install -r requirements.txt
        }
        pip install pyinstaller
      shell: pwsh

    - name: Verify required files
      run: |
        Write-Host "Checking required files..."
        $requiredFiles = @("main_gui.py", "start_gui.py", "craft_engine.py", "recipe_manager.py", "logo.ico")
        foreach ($file in $requiredFiles) {
          if (Test-Path $file) {
            Write-Host "Found: $file"
          } else {
            Write-Host "Missing: $file"
            exit 1
          }
        }
      shell: pwsh

    - name: Build EXE
      run: |
        Write-Host "Building EXE file..."
        python build_exe.py
      shell: pwsh
      env:
        CI: true
        GITHUB_ACTIONS: true
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1

    - name: Verify build and generate hashes
      run: |
        $exePath = "dist\魔力宝贝制造助手.exe"
        if (Test-Path $exePath) {
          Write-Host "EXE file built successfully"
          $fileSize = (Get-Item $exePath).Length / 1MB
          Write-Host "File size: $([math]::Round($fileSize, 2)) MB"

          # Generate hashes
          Write-Host "Generating file hashes..."
          python generate_hashes.py

          # Get hashes for display
          $md5 = (Get-FileHash -Algorithm MD5 $exePath).Hash
          $sha256 = (Get-FileHash -Algorithm SHA256 $exePath).Hash
          Write-Host "MD5: $md5"
          Write-Host "SHA256: $sha256"
        } else {
          Write-Host "EXE file build failed"
          exit 1
        }
      shell: pwsh

    - name: Generate version tag
      id: version
      run: |
        $date = Get-Date -Format "yyyy.MM.dd"
        $time = Get-Date -Format "HHmm"
        $version = "v$date-$time"
        Write-Host "Generated version: $version"
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "date=$date" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: "魔力宝贝制造助手 ${{ steps.version.outputs.date }}"
        body: |
          ## 魔力宝贝制造助手 自动构建版本

          **构建日期**: ${{ steps.version.outputs.date }}
          **提交**: ${{ github.sha }}

          ### 下载文件
          - `魔力宝贝制造助手.exe` - 主程序
          - 哈希验证文件

          ### 安全说明
          - 完全开源，代码透明
          - 无恶意代码，无隐私收集
          - 可通过VirusTotal验证安全性
          - 包含文件哈希验证

          > 如果Windows Defender误报，请添加到白名单

          ### 使用方法
          1. 下载 `魔力宝贝制造助手.exe`
          2. 如遇杀毒软件误报，请添加到白名单
          3. 双击运行
          4. 在「设置」中截取背包定位、执行按钮、制造完成、整理背包的图片模板
          5. 截取0-9数字模板
          6. 新建配方，添加材料截图和数量
          7. 绑定游戏窗口，开始制造

          ---
          *此版本由 GitHub Actions 自动构建*
        draft: false
        prerelease: false
        files: |
          dist/魔力宝贝制造助手.exe
          dist/*_hashes.txt
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifacts (backup)
      uses: actions/upload-artifact@v4
      with:
        name: moli-craft-assistant-${{ steps.version.outputs.version }}
        path: |
          dist/魔力宝贝制造助手.exe
          dist/*_hashes.txt
        retention-days: 30
